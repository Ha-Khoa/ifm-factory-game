<app-start-screen (startClicked)="onStartGame($event)" (settingsClicked)="onSettingsOpen()" (tutorialClicked)="onTutorialOpen()"></app-start-screen>

<div #gameContainer class="game-container">

  <canvas #game width="{{ cwidth }}" height="{{ cheight }}"></canvas>
  <canvas #ui width="{{ cwidth }}" height="{{ cheight }}" class="ui"></canvas>
  <app-hud *ngIf="!showStartScreen"></app-hud>
  <app-settings *ngIf="isSettingsOpen"
                (closeSettingsRequest)="isSettingsOpen = false"></app-settings>
</div>
<app-tutorial
      *ngIf="isTutorialOpen"
      (closeRequest)="onTutorialClose()">
  </app-tutorial>
