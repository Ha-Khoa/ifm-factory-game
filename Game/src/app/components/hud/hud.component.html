<div *ngIf="player$ | async as player" class="stats-box">
  <div class="stat-item">
    <img src="/images/fox/fox-coin.png" class="icon" alt="" />
    <span class="money-val">{{ player.money | number }}</span>
  </div>

  <div class="stat-item">
    <img src="/images/fox/fox-trophy.png" class="icon"  alt=""/>
    <span class="score-val">{{ player.score | number }}</span>
  </div>
</div>
