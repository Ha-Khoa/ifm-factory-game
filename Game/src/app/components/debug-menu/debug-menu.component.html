<div class="menu-container" [ngClass]="{ 'closing': isClosing }">
  <div class="tabs">
    <button class="tab" (click)="changeToStats()" >Stats</button>
    <button class="tab" (click)="changeToOrders()" >Orders</button>
  </div>
  <h1 class="menu-title">Debug Menu</h1>
  @switch (tab) {
    @case ('stats') {
      <app-stats></app-stats>
    }
    @case ('orders') {
      <app-orders></app-orders>
    }
  }
</div>
